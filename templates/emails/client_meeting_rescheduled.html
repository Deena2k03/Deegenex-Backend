<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; font-family: 'Segoe UI', Arial, sans-serif; }
        .email-wrapper { width: 100%; padding: 40px 0; }
        .email-container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background: #000471; color: #ffffff; text-align: center; padding: 25px; font-size: 20px; font-weight: bold; }
        .content { padding: 40px; text-align: center; color: #444; }
        .icon-box { font-size: 40px; margin-bottom: 10px; }
        h2 { color: #1a202c; margin: 0 0 10px 0; }
        .info-table { width: 100%; background: #f8fafc; border-radius: 10px; padding: 15px; border-collapse: collapse; table-layout: fixed; margin-top: 20px; }
        .info-table td { padding: 12px 8px; border-bottom: 1px solid #edf2f7; font-size: 14px; vertical-align: top; }
        .label { font-weight: bold; color: #718096; width: 40%; text-align: left; }
        .value { font-weight: bold; color: #2d3748; width: 60%; text-align: left; }
        .btn-container { margin-top: 30px; }
        .join-btn { background: #28a745; color: #ffffff !important; padding: 14px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .reschedule-btn { background: transparent; color: #1f5fbf !important; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; border: 2px solid #1f5fbf; font-size: 14px; margin-top: 10px; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #cbd5e0; }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="header">Meeting Rescheduled – Deegenex</div>
            <div class="content">
                <div class="icon-box">🔄</div>
                <h2>Schedule Updated</h2>
                <p>Hello <b>{{ client_name }}</b>, your meeting has been successfully rescheduled.</p>

                <table class="info-table">
                    <tr><td class="label">📅 New Date</td><td class="value">{{ meeting_date }}</td></tr>
                    <tr><td class="label">⏰ New Time</td><td class="value">{{ meeting_time }}</td></tr>
                    <tr><td class="label">💻 Platform</td><td class="value">Google Meet</td></tr>
                </table>

                <div class="btn-container">
                    <a href="{{ meet_link }}" class="join-btn">🎥 Join Google Meet</a>
                    <br>
                    <a href="{{ reschedule_url }}" class="reschedule-btn">🔄 Need to change again?</a>
                </div>
            </div>
            <div class="footer">&copy; {% now "Y" %} Deegenex Team | info@deegenex.com</div>
        </div>
    </div>
</body>
</html>
