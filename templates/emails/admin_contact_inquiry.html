<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f9; font-family: 'Segoe UI', Arial, sans-serif; }
        .email-wrapper { width: 100%; padding: 40px 0; }
        .email-container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background: #0b5cff; color: #ffffff; text-align: center; padding: 20px; font-size: 18px; font-weight: bold; }
        .content { padding: 30px; color: #444; }
        h3 { color: #000245; margin-top: 0; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        .info-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .info-table td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        .label { font-weight: bold; color: #718096; width: 35%; }
        .value { color: #2d3748; }
        .message-box { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #edf2f7; margin-top: 10px; font-style: italic; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="header">Internal Notification: New Website Inquiry</div>
            <div class="content">
                <h3>Inquiry Details</h3>
                <table class="info-table">
                    <tr><td class="label">Name</td><td class="value">{{ name }}</td></tr>
                    <tr><td class="label">Email</td><td class="value">{{ email }}</td></tr>
                    <tr><td class="label">Phone</td><td class="value">{{ phone }}</td></tr>
                    <tr><td class="label">Subject</td><td class="value">{{ subject }}</td></tr>
                </table>

                <h3>User Message</h3>
                <div class="message-box">
                    "{{ message }}"
                </div>
            </div>
            <div class="footer">Website Contact Form - Deegenex Portal</div>
        </div>
    </div>
</body>
</html>
