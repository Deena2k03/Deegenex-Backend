<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Same styles as above, but with a darker header */
        body { margin: 0; padding: 0; background-color: #f4f7f9; font-family: 'Segoe UI', Arial, sans-serif; }
        .email-wrapper { width: 100%; padding: 40px 0; }
        .email-container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background: #000485; color: #ffffff; text-align: center; padding: 25px; font-size: 20px; font-weight: bold; }
        .content { padding: 40px; color: #444; }
        .icon-box { text-align: center; font-size: 40px; margin-bottom: 10px; }
        h2 { text-align: center; color: #1a202c; }
        .info-table { width: 100%; background: #f8fafc; border-radius: 10px; padding: 15px; border-collapse: collapse; table-layout: fixed; }
        .info-table td { padding: 12px 8px; border-bottom: 1px solid #edf2f7; font-size: 14px; vertical-align: top; }
        .label { font-weight: bold; color: #718096; width: 40%; text-align: left; }
        .value { font-weight: bold; color: #2d3748; width: 60%; text-align: left; }
        .btn-container { text-align: center; margin-top: 30px; }
        .join-btn { background: #28a745; color: #ffffff !important; padding: 14px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #cbd5e0; }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="header">New Client Meeting Booked</div>
            <div class="content">
                <div class="icon-box">📩</div>
                <h2>Meeting Details</h2>
                <table class="info-table">
                    <tr><td class="label">👤 Client</td><td class="value">{{ client_name }}</td></tr>
                    <tr><td class="label">🏢 Company</td><td class="value">{{ company_name }}</td></tr>
                    <tr><td class="label">📞 Mobile</td><td class="value">{{ client_mobile }}</td></tr>
                    <tr><td class="label">📅 Date</td><td class="value">{{ meeting_date }}</td></tr>
                    <tr><td class="label">⏰ Time</td><td class="value">{{ meeting_time }}</td></tr>
                </table>
                <div class="btn-container">
                    <a href="{{ meet_link }}" class="join-btn">🎥 Join Google Meet</a>
                </div>
            </div>
            <div class="footer">Automated Notification - Deegenex Scheduler</div>
        </div>
    </div>
</body>
</html>
